        <meta name="description" content="Esplora le location dei film più famosi girati in Italia e scopri la magia del grande schermo" />
        <meta name="author" content="Ayca" />
        <title>CineViaggio</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        <!-- Leaflet CSS -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    </head>
    <body>
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="index.html">CineViaggio</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Menu
                    <i class="fas fa-bars"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto py-4 py-lg-0">
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="raccolta.html">Raccolta Film</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="mappa.html">Mappa</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <!-- Page Header-->
        <header class="masthead" style="background-image: url('assets/img/dolce_vita_fontana.jpg')">
            <div class="container position-relative px-2 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="site-heading">
                            <h1>Scopri i film che hanno reso celebri le città italiane</h1>
                            <span class="subheading"></span>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        
        <!-- Mappa Interattiva -->
        <div class="container px-4 px-lg-5">
            <h2 class="text-center">Esplora le location dei film</h2>
            <div id="map" style="width: 100%; height: 500px;"></div>
        </div>
        
        <script>
            var map = L.map('map').setView([41.9028, 12.4964], 6); // Centro Italia
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            
            var films = [
                {title: "La Dolce Vita", lat: 41.9009, lon: 12.4833, img: "assets/img/dolce_vita_poster.jpg", link: "film1.html"},
                {title: "Il Postino", lat: 38.5564, lon: 14.8803, img: "assets/img/postino_poster.jpg", link: "film2.html"},
                {title: "Call Me By Your Name", lat: 45.3647, lon: 9.6833, img: "assets/img/cmbyn_poster.jpg", link: "film3.html"},
                {title: "The Tourist", lat: 45.4408, lon: 12.3155, img: "assets/img/tourist_poster.jpg", link: "film4.html"}
            ];
            
            films.forEach(function(film) {
                var marker = L.marker([film.lat, film.lon]).addTo(map);
                var popupContent = `<a href="${film.link}"><img src="${film.img}" width="100"><br>${film.title}</a>`;
                marker.bindPopup(popupContent);
            });
        </script>
        
        <!-- Footer-->
        <footer class="border-top">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="small text-center text-muted fst-italic">&copy; 2025 CineViaggio - Progetto Universitario</div>
                    </div>
                </div>
            </div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
    </body>
</html>
